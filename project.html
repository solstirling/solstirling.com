<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project | Sol Stirling Maker Portfolio</title>
  <script src="projects-data.js"></script>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <header class="site-frame top-bar">
    <a href="index.html" class="logo-mark" aria-label="Sol Stirling home">
      <img src="images/logo.png" alt="Sol Stirling logo">
      <span class="mark-text">
        <span>maker portfolio</span>
        <span>project file</span>
      </span>
    </a>
    <div class="owner-name">Sol Stirling</div>
  </header>

  <main class="site-frame project-shell">
    <a class="back-link" href="index.html">back to homepage</a>
    <article id="project-content" class="project-detail"></article>
  </main>

  <script>
    const content = document.getElementById('project-content');

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeBlocks(raw) {
      if (!Array.isArray(raw)) return [];
      return raw.filter((block) => block && (block.text || block.url));
    }

    function renderBlock(block) {
      if (block.type === 'image') {
        const caption = block.caption ? `<p class="caption">${escapeHtml(block.caption)}</p>` : '';
        return `<div><img src="${escapeHtml(block.url)}" alt="${escapeHtml(block.caption || 'Project media')}">${caption}</div>`;
      }

      if (block.type === 'video') {
        const caption = block.caption ? `<p class="caption">${escapeHtml(block.caption)}</p>` : '';
        return `<div><video src="${escapeHtml(block.url)}" controls playsinline preload="metadata"></video>${caption}</div>`;
      }

      return `<div class="content-block">${block.text || ''}</div>`;
    }

    function renderProject(project) {
      const blocks = normalizeBlocks(project.contentBlocks);
      const media = project.hideHeroMedia
        ? ''
        : project.mediaType === 'video'
          ? `<video class="project-hero-media" src="${escapeHtml(project.mediaSrc)}" controls playsinline preload="metadata"></video>`
          : `<img class="project-hero-media" src="${escapeHtml(project.mediaSrc)}" alt="${escapeHtml(project.mediaAlt || project.title)}">`;

      content.dataset.project = project.id;
      content.innerHTML = `
        <div>
          <p class="status-line">${escapeHtml(project.status || 'Project')}</p>
          <h1 class="project-title">${escapeHtml(project.title)}</h1>
          <p class="project-lede">${escapeHtml(project.description)}</p>
        </div>
        ${media ? `${media}` : ``}
        <div class="content-stack">${blocks.map(renderBlock).join('')}</div>
      `;
      document.title = `${project.title} | Sol Stirling Maker Portfolio`;
    }

    function renderError() {
      content.innerHTML = '<p class="error-text">Project file not found.</p>';
    }

    const slug = new URLSearchParams(window.location.search).get('project');
    const projects = window.PortfolioProjects && window.PortfolioProjects.projects ? window.PortfolioProjects.projects : [];
    const project = projects.find((item) => item.id === slug);

    if (project) {
      renderProject(project);
    } else {
      renderError();
    }
  </script>
</body>
</html>
