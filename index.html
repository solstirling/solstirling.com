<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sol Stirling Maker Portfolio</title>
  <script src="projects-data.js"></script>
  <link rel="stylesheet" href="site.css">
</head>
<body>
  <header class="site-frame top-bar">
    <a href="index.html" class="logo-mark" aria-label="Sol Stirling home">
      <img src="images/logo.png" alt="Sol Stirling logo">
      <span class="mark-text">
        <span>maker portfolio</span>
        <span>rev 03 / static</span>
      </span>
    </a>
    <div class="owner-name">Sol Stirling</div>
  </header>

  <main>
    <section class="site-frame hero" aria-labelledby="welcome-title">
      <div class="hero-inner">
        <p class="kicker">CAD / robotics / mechanical experiments</p>
        <h1 id="welcome-title" class="hero-title">welcome to my maker portfolio</h1>

        <nav class="social-row" aria-label="Social links">
          <a class="social-link" href="https://www.linkedin.com/in/solstirling" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <img src="images/linkedin.png" alt="">
          </a>
          <a class="social-link" href="https://www.instagram.com/thesol.stirling/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <img src="images/IG.png" alt="">
          </a>
          <a class="social-link" href="https://discord.com/users/767132236410912828" target="_blank" rel="noopener noreferrer" aria-label="Discord">
            <img src="images/discord.png" alt="">
          </a>
        </nav>
      </div>
    </section>

    <section class="site-frame" aria-labelledby="projects-title">
      <div class="section-head">
        <h2 id="projects-title">project index</h2>
      </div>
      <div id="projects-carousel" class="project-carousel" aria-live="polite"></div>
    </section>

    <section class="site-frame reach-out" aria-labelledby="reach-title">
      <div class="reach-grid">
        <div>
          <p class="kicker">contact channel</p>
          <h2 id="reach-title">reach out</h2>
        </div>

        <form id="contact-form" class="contact-form">
          <label>
            Your email
            <input id="contact-email" type="email" name="email" autocomplete="email" placeholder="you@example.com" required>
          </label>
          <label>
            Message
            <textarea id="contact-message" name="message" placeholder="What are we building?" required></textarea>
          </label>
          <button class="send-button" type="submit">open email</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    const carousel = document.getElementById('projects-carousel');
    const contactForm = document.getElementById('contact-form');
    const contactEmail = document.getElementById('contact-email');
    const contactMessage = document.getElementById('contact-message');

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function projectUrl(project) {
      return project.link || `project.html?project=${encodeURIComponent(project.id)}`;
    }

    function renderProjectCards(projects) {
      carousel.innerHTML = projects
        .map((project, index) => {
          const tilt = [-3, 2, -1, 3, -2][index % 5];
          const label = String(index + 1).padStart(2, '0');
          const media = project.mediaType === 'video'
            ? `<video class="project-media" src="${escapeHtml(project.mediaSrc)}" muted playsinline preload="metadata"></video>`
            : `<img class="project-media" src="${escapeHtml(project.mediaSrc)}" alt="${escapeHtml(project.mediaAlt || project.title)}">`;

          const url = projectUrl(project);
          const isExternal = /^https?:\/\//.test(url);
          const targetAttrs = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';

          return `
            <a class="project-card" data-project="${escapeHtml(project.id)}" href="${escapeHtml(url)}"${targetAttrs} style="--tilt: ${tilt}deg;">
              ${media}
              <div class="project-body">
                <div class="project-meta">
                  <span>${label}</span>
                  <span>${escapeHtml(project.status || 'Logged')}</span>
                </div>
                <h3>${escapeHtml(project.title)}</h3>
                <p>${escapeHtml(project.description)}</p>
                <span class="card-open">${isExternal ? 'open app' : 'open file'}</span>
              </div>
            </a>
          `;
        })
        .join('');
    }

    carousel.addEventListener('wheel', (event) => {
      if (Math.abs(event.deltaY) <= Math.abs(event.deltaX)) return;
      event.preventDefault();
      carousel.scrollBy({ left: event.deltaY, behavior: 'smooth' });
    }, { passive: false });

    contactForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const from = contactEmail.value.trim();
      const message = contactMessage.value.trim();
      const subject = encodeURIComponent(`Portfolio reach out from ${from}`);
      const body = encodeURIComponent(`${message}\n\nFrom: ${from}`);
      const target = [115, 111, 108, 115, 116, 105, 114, 108, 105, 110, 103, 48, 51, 64, 103, 109, 97, 105, 108, 46, 99, 111, 109].map((code) => String.fromCharCode(code)).join("");
      window.location.href = `mailto:${target}?subject=${subject}&body=${body}`;
    });

    renderProjectCards(window.PortfolioProjects.projects);
  </script>
</body>
</html>
